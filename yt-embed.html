<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  iframe { width: 100vw; height: 100vh; border: 0; }
</style>
</head>
<body>
<iframe id="player" title="YouTube video player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
<script>
  var id = new URLSearchParams(location.search).get('id') || 'dQw4w9WgXcQ';
  document.getElementById('player').src =
    'https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0&controls=1';
</script>
</body>
</html>
